<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المتابعة الفورية للعمليات</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
  <div id="login-card" class="max-w-md mx-auto card p-6 mt-16">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-extrabold text-slate-800 mb-2">لوحة المتابعة الفورية للعمليات</h1>
      <p class="text-sm text-slate-500">أدخل كود الموظف لعرض الليدز الخاصة بك</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">كود الموظف</label>
        <input id="login-emp-input" type="text" class="w-full border-2 border-slate-300 rounded-xl px-4 py-3 bg-white focus:outline-none focus:border-blue-600" placeholder="مثال: CC01">
      </div>
      <button onclick="login()" class="w-full bg-blue-700 hover:bg-blue-800 text-white py-3 rounded-xl font-bold transition">دخول</button>
    </div>
  </div>

  <div id="app-container" class="hidden max-w-7xl mx-auto space-y-6">
    <div class="card p-4 md:p-5 flex flex-wrap gap-3 justify-between items-center">
      <div>
        <h2 class="text-xl font-extrabold text-slate-800">لوحة المتابعة الفورية للعمليات</h2>
        <p class="text-sm text-slate-500">الموظف الحالي: <span id="user-display-badge" class="font-extrabold text-emerald-700"></span></p>
      </div>
      <div class="flex gap-2 items-center">
        <select id="status-filter" onchange="renderTable()" class="border rounded-xl px-3 py-2 bg-white text-sm font-bold">
          <option value="ALL">كل الحالات</option>
          <option value="تأكيد الطلب">تأكيد الطلب</option>
          <option value="تم التواصل">تم التواصل</option>
          <option value="جاري المتابعة">جاري المتابعة</option>
          <option value="مؤجل">مؤجل</option>
          <option value="مغلق">مغلق</option>
          <option value="لا يرد">لا يرد</option>
        </select>
        <input id="search-box" oninput="renderTable()" type="text" placeholder="بحث باسم العميل أو الهاتف" class="border rounded-xl px-3 py-2 bg-white text-sm min-w-[250px]">
        <button onclick="logout()" class="bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 rounded-xl px-4 py-2 text-sm font-bold">خروج آمن</button>
      </div>
    </div>

    <div id="saving-indicator" class="hidden text-center text-sm font-bold text-blue-700">جاري الحفظ...</div>

    <div class="card p-4">
      <div class="overflow-x-auto">
        <table class="w-full text-right border-collapse text-sm">
          <thead>
            <tr class="bg-slate-950 text-white">
              <th class="p-3">#</th>
              <th class="p-3">التاريخ</th>
              <th class="p-3">اسم العميل</th>
              <th class="p-3">رقم الهاتف</th>
              <th class="p-3">المنتج</th>
              <th class="p-3">السعر</th>
              <th class="p-3">الحالة</th>
              <th class="p-3">الملاحظات</th>
              <th class="p-3">تاريخ المتابعة القادم</th>
              <th class="p-3">إجراء</th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpCXaJZDPM_QdmKKj0lNXETIcYoQssnqS7B0tQcHooQ9iWDHVijqqnjl6XPZ6EJld4ig/exec';
    let loggedEmpCode = '';
    let originalRecords = [];
    let modifiedRows = new Set();
    let autoSaveTimer = null;

    function normalizeEmployeeCode(value) { return String(value || '').replace(/\s+/g, '').trim().toUpperCase(); }
    function normalizeText(value) { return String(value || '').trim(); }
    function normalizeNumber(value) { if (typeof value === 'number') return value; const cleaned = String(value || '').replace(/[^\d.,-]/g, '').replace(/,/g, ''); const num = parseFloat(cleaned); return isNaN(num) ? 0 : num; }
    function parseFlexibleDate(value) {
      if (!value) return null;
      if (value instanceof Date && !isNaN(value.getTime())) return value;
      const str = String(value).trim();
      if (!str) return null;
      const direct = new Date(str);
      if (!isNaN(direct.getTime())) return direct;
      const cleaned = str.replace(/[م]/g, '').replace(/[ص]/g, '').replace(/\u200f/g, '').replace(/\u200e/g, '').trim();
      const match = cleaned.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if (match) return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
      return null;
    }
    function formatDateDisplay(value) { const d = parseFlexibleDate(value); return d ? d.toLocaleDateString('ar-EG') : '-'; }
    function dateToInputValue(value) { const d = parseFlexibleDate(value); if (!d) return ''; const y = d.getFullYear(); const m = String(d.getMonth()+1).padStart(2,'0'); const day = String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
    function cleanDateToYYYYMMDD(value) { if (!value) return ''; const d = parseFlexibleDate(value); if (!d) return value; const y = d.getFullYear(); const m = String(d.getMonth()+1).padStart(2,'0'); const day = String(d.getDate()).padStart(2,'0'); return `${y}/${m}/${day}`; }

    function login() {
      const inputVal = document.getElementById('login-emp-input').value;
      const cleanCode = normalizeEmployeeCode(inputVal);
      if (!cleanCode) { alert('من فضلك أدخل كود الموظف الخاص بك.'); return; }
      loggedEmpCode = cleanCode;
      document.getElementById('login-card').classList.add('hidden');
      document.getElementById('app-container').classList.remove('hidden');
      document.getElementById('user-display-badge').innerText = loggedEmpCode;
      loadDataFromSheet();
      autoSaveTimer = setInterval(() => { if (modifiedRows.size > 0) saveAllModifiedRowsSilently(); }, 15000);
    }

    function logout() {
      if (autoSaveTimer) clearInterval(autoSaveTimer);
      loggedEmpCode = '';
      originalRecords = [];
      modifiedRows.clear();
      document.getElementById('app-container').classList.add('hidden');
      document.getElementById('login-card').classList.remove('hidden');
      document.getElementById('login-emp-input').value = '';
    }

    async function loadDataFromSheet() {
      try {
        const response = await fetch(`${SCRIPT_URL}?empCode=${encodeURIComponent(loggedEmpCode)}`);
        const data = await response.json();
        originalRecords = (Array.isArray(data) ? data : []).map(item => ({ ...item, employeeCode: normalizeEmployeeCode(item.employeeCode), price: normalizeNumber(item.price) }));
        renderTable();
      } catch (e) {
        console.error(e);
        alert('فشل تحميل البيانات من الشيت.');
      }
    }

    function markRowAsModified(rowIndex) {
      modifiedRows.add(String(rowIndex));
      const btn = document.getElementById(`btn-save-${rowIndex}`);
      if (btn) {
        btn.classList.remove('bg-emerald-600');
        btn.classList.add('bg-amber-500');
      }
    }

    function getFilteredRecords() {
      const statusFilter = document.getElementById('status-filter').value;
      const search = normalizeText(document.getElementById('search-box').value).toLowerCase();
      return originalRecords.filter(item => {
        if (statusFilter !== 'ALL' && normalizeText(item.status) !== statusFilter) return false;
        if (search) {
          const hay = [item.customerName, item.phone, item.productType].join(' ').toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });
    }

    function renderTable() {
      const rows = getFilteredRecords();
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="10" class="p-4 text-center text-slate-400">لا توجد بيانات مطابقة</td></tr>`;
        return;
      }
      rows.forEach((item, idx) => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-50';
        tr.innerHTML = `
          <td class="p-3">${idx + 1}</td>
          <td class="p-3">${formatDateDisplay(item.date)}</td>
          <td class="p-3 font-bold text-slate-800">${item.customerName || '-'}</td>
          <td class="p-3">${item.phone || '-'}</td>
          <td class="p-3"><span class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-1 rounded-lg text-xs font-bold">${item.productType || '-'}</span></td>
          <td class="p-3 text-emerald-700 font-bold">${normalizeNumber(item.price).toLocaleString('ar-EG')} ج.م</td>
          <td class="p-3"><select id="status-${item.rowIndex}" onchange="markRowAsModified('${item.rowIndex}')" class="w-full border rounded-lg p-2 bg-white text-sm font-bold"><option value="">--- اختر ---</option><option value="تأكيد الطلب" ${item.status === 'تأكيد الطلب' ? 'selected' : ''}>تأكيد الطلب</option><option value="تم التواصل" ${item.status === 'تم التواصل' ? 'selected' : ''}>تم التواصل</option><option value="جاري المتابعة" ${item.status === 'جاري المتابعة' ? 'selected' : ''}>جاري المتابعة</option><option value="مؤجل" ${item.status === 'مؤجل' ? 'selected' : ''}>مؤجل</option><option value="مغلق" ${item.status === 'مغلق' ? 'selected' : ''}>مغلق</option><option value="لا يرد" ${item.status === 'لا يرد' ? 'selected' : ''}>لا يرد</option></select></td>
          <td class="p-3"><input id="notes-${item.rowIndex}" value="${(item.notes || '').replace(/"/g, '&quot;')}" oninput="markRowAsModified('${item.rowIndex}')" class="w-full border rounded-lg p-2 bg-white text-sm" placeholder="اكتب ملاحظات الحالة..."></td>
          <td class="p-3"><input id="followUp-${item.rowIndex}" type="date" value="${dateToInputValue(item.followUpDate)}" onchange="markRowAsModified('${item.rowIndex}')" class="w-full border rounded-lg p-2 bg-white text-sm"></td>
          <td class="p-3"><button id="btn-save-${item.rowIndex}" onclick="saveSingleRow('${item.rowIndex}')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold">حفظ</button></td>`;
        tbody.appendChild(tr);
      });
    }

    async function saveSingleRow(rowIndex) {
      const indicator = document.getElementById('saving-indicator');
      indicator.classList.remove('hidden');
      const stat = document.getElementById(`status-${rowIndex}`).value;
      const nts = document.getElementById(`notes-${rowIndex}`).value;
      const fUp = cleanDateToYYYYMMDD(document.getElementById(`followUp-${rowIndex}`).value);
      try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'updateFollowupRow', rowIndex: rowIndex, status: stat, notes: nts, followUpDate: fUp }) });
        const result = await response.json();
        if (!result.success) throw new Error(result.message || 'Save failed');
        modifiedRows.delete(String(rowIndex));
        const row = originalRecords.find(r => String(r.rowIndex) === String(rowIndex));
        if (row) { row.status = stat; row.notes = nts; row.followUpDate = fUp; }
        const btn = document.getElementById(`btn-save-${rowIndex}`);
        if (btn) { btn.classList.remove('bg-amber-500'); btn.classList.add('bg-emerald-600'); }
      } catch (e) {
        console.error(e);
        alert('فشل حفظ التعديلات في الشيت.');
      }
      indicator.classList.add('hidden');
    }

    async function saveAllModifiedRowsSilently() {
      const indicator = document.getElementById('saving-indicator');
      indicator.classList.remove('hidden');
      const list = Array.from(modifiedRows);
      for (let rId of list) {
        const s = document.getElementById(`status-${rId}`)?.value || '';
        const n = document.getElementById(`notes-${rId}`)?.value || '';
        const f = cleanDateToYYYYMMDD(document.getElementById(`followUp-${rId}`)?.value || '');
        try {
          const response = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'updateFollowupRow', rowIndex: rId, status: s, notes: n, followUpDate: f }) });
          const result = await response.json();
          if (!result.success) throw new Error(result.message || 'Auto save failed');
          modifiedRows.delete(String(rId));
          const row = originalRecords.find(r => String(r.rowIndex) === String(rId));
          if (row) { row.status = s; row.notes = n; row.followUpDate = f; }
          const btn = document.getElementById(`btn-save-${rId}`);
          if (btn) { btn.classList.remove('bg-amber-500'); btn.classList.add('bg-emerald-600'); }
        } catch (e) { console.error(e); }
      }
      indicator.classList.add('hidden');
    }
  </script>
</body>
</html>
